name: arm-determinism

# Cross-architecture determinism gate (the PoSim gate).
# The canonical x86_64 hash is locked (3/3 identical runs, AMD EPYC, Julia 1.11.5).
# This job runs the SAME determinism test on real ARM64 hardware (GitHub's free
# ubuntu-24.04-arm runner) and asserts the SHA-256 of the final sim state is
# bit-identical to x86. Match => cross-arch determinism proven, gate closed.

on:
  push:
    paths:
      - 'src/veilsim_engine.jl'
      - 'test/determinism_real.jl'
      - 'test/determinism_mujoco.py'
      - 'test/determinism_mujoco_contacts.py'
      - '.github/workflows/arm-determinism.yml'
  workflow_dispatch:

jobs:
  arm-determinism-julia:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Julia 1.11.5 (aarch64)
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11.5'
          arch: aarch64

      - name: Instantiate project deps
        run: julia --project=@. -e 'using Pkg; Pkg.instantiate()'

      - name: Run determinism test on ARM64 and compare to canonical x86 hash
        run: |
          set -euo pipefail
          CANON=782a7b2a708554c6516a693be987c6bc2cb1e506bbb8971c9e17163d25c8b097
          HASH=$(julia --project=@. test/determinism_real.jl | grep '^DETERMINISM_HASH=' | cut -d= -f2)
          echo "arch:      $(uname -m)"
          echo "canonical: $CANON  (x86_64)"
          echo "arm64:     $HASH"
          if [ "$HASH" = "$CANON" ]; then
            echo "✅ cross-arch determinism PROVEN — x86_64 == arm64. PoSim gate CLOSED."
          else
            echo "❌ MISMATCH — arm64 diverges from x86_64."
            echo "   Next: audit @fastmath/muladd/fma in veilsim_engine.jl, force openlibm, pin reduction order."
            exit 1
          fi

  arm-determinism-mujoco:
    # MuJoCo cross-arch check. Canonical x86 hash confirmed 2026-07-16 on both
    # macOS x86_64 (Python 3.9.6) and Linux x86_64 (Python 3.12.3), mujoco==3.3.7
    # pinned on both. Version MUST stay pinned -- unpinned installs resolve to
    # whatever is latest, which is not guaranteed to reproduce this hash even on
    # matching hardware (verified this the hard way: default pip install pulled
    # 3.10.0 on the VPS while the Mac had 3.3.7).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned MuJoCo
        run: pip install mujoco==3.3.7 numpy

      - name: Run MuJoCo determinism test on ARM64 and compare to canonical x86 hash
        run: |
          set -euo pipefail
          CANON=5d731393877eaa77ab054ee43f6cd2edaf99ac29c17eda004737abf2968b20f6
          HASH=$(python3 test/determinism_mujoco.py | grep '^DETERMINISM_HASH=' | cut -d= -f2)
          echo "arch:      $(uname -m)"
          echo "canonical: $CANON  (x86_64)"
          echo "arm64:     $HASH"
          if [ "$HASH" = "$CANON" ]; then
            echo "✅ MuJoCo cross-arch determinism PROVEN — x86_64 == arm64."
          else
            echo "❌ MISMATCH — arm64 diverges from x86_64."
            echo "   Next: check mujoco version drift, compiler flags, contact solver settings."
            exit 1
          fi

  arm-determinism-mujoco-contacts:
    # The real MuJoCo risk case: a box tumbles and settles through actual
    # contact resolution (iterative solver over active constraints), not
    # the contact-free pendulum above. Solver iteration order is exactly
    # the kind of thing that can legitimately differ across platforms
    # without being a bug anywhere -- this job is the actual determinism
    # bar for anything that touches the ground. Canonical hash confirmed
    # 2026-07-16 on macOS x86_64 + Linux x86_64, mujoco==3.3.7 pinned.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned MuJoCo
        run: pip install mujoco==3.3.7 numpy

      - name: Run MuJoCo contacts determinism test on ARM64 and compare to canonical x86 hash
        run: |
          set -euo pipefail
          CANON=e423652c04d84ddf4f2bad98052d7f7526735fc59c626e2e4132d452744768a1
          HASH=$(python3 test/determinism_mujoco_contacts.py | grep '^DETERMINISM_HASH=' | cut -d= -f2)
          echo "arch:      $(uname -m)"
          echo "canonical: $CANON  (x86_64)"
          echo "arm64:     $HASH"
          if [ "$HASH" = "$CANON" ]; then
            echo "✅ MuJoCo CONTACT-RESOLUTION cross-arch determinism PROVEN — x86_64 == arm64."
          else
            echo "❌ MISMATCH — arm64 diverges from x86_64 on contact resolution."
            echo "   This is the real, expected-hard case -- a mismatch here is informative,"
            echo "   not a broken pipeline. Next: pin solver iteration count/tolerance"
            echo "   explicitly in the XML (do not rely on defaults), check for SIMD-width-"
            echo "   dependent reduction order in the contact solver."
            exit 1
          fi
